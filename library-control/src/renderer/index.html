<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Bibliotecário</h1>

      <button class="nav-btn active" data-page="dashboard">Dashboard</button>
      <button class="nav-btn" data-page="acervo">Acervo</button>
      <button class="nav-btn" data-page="usuarios">Usuários</button>
      <button class="nav-btn" data-page="emprestimos">Empréstimos</button>
    </aside>

    <main class="content">
      <p id="status"></p>

      <h3>Cadastrar usuário</h3>

      <div class="form-emprestimo">
        <input type="text" id="usuarioNome" placeholder="Nome" />
        <input type="text" id="usuarioLogin" placeholder="Login" />
        <input type="number" id="usuarioNivel" placeholder="Nível" min="0" />
        <input type="text" id="usuarioTurma" placeholder="Turma" />
        <input type="text" id="usuarioFone" placeholder="Telefone" />
        <input type="text" id="usuarioEmail" placeholder="E-mail" />

        <button id="btnSalvarUsuario">Salvar usuário</button>
      </div>

      <div id="statusUsuario"></div>

      <hr />

      <section id="page-dashboard" class="page active">
        <h2>Dashboard</h2>

        <section class="dashboard">
          <div class="card">
            <h3>Total de livros</h3>
            <p id="cardTotalLivros">0</p>
          </div>

          <div class="card">
            <h3>Total de usuários</h3>
            <p id="cardTotalUsuarios">0</p>
          </div>

          <div class="card">
            <h3>Empréstimos ativos</h3>
            <p id="cardEmprestimosAtivos">0</p>
          </div>

          <div class="card card-alerta">
            <h3>Empréstimos atrasados</h3>
            <p id="cardEmprestimosAtrasados">0</p>
          </div>
        </section>

        <section id="page-acervo" class="page">
          <h2>Acervo</h2>

          <h3>Cadastrar livro</h3>

          <div class="form-emprestimo">
            <input id="livroTitulo" placeholder="Título" />
            <input id="livroAutor" placeholder="Autor" />
            <input id="livroEditora" placeholder="Editora" />
            <input id="livroIsbn" placeholder="ISBN" />
            <input
              id="livroQuantidade"
              type="number"
              placeholder="Quantidade"
              min="0"
            />

            <!-- Categoria -->
            <input
              id="livroCategoria"
              type="number"
              placeholder="Categoria (id)"
            />

            <!-- Upload -->
            <button id="btnSelecionarImagem" type="button">
              Selecionar imagem
            </button>
            <span id="nomeImagemSelecionada">Nenhuma imagem</span>

            <button id="btnCriarLivro">Salvar livro</button>
          </div>

          <div id="statusLivro"></div>

          <hr />

          <input
            type="text"
            id="busca"
            placeholder="Buscar por título ou autor..."
          />
          <button id="btnBuscar">Buscar</button>

          <div id="resultado"></div>
        </section>

        <h3>Empréstimos atrasados</h3>
        <button id="btnCarregarAtrasados">Carregar atrasados</button>
        <div id="resultadoAtrasados"></div>
      </section>

      <section id="page-acervo" class="page">
        <h2>Acervo</h2>

        <input
          type="text"
          id="busca"
          placeholder="Buscar por título ou autor..."
        />
        <button id="btnBuscar">Buscar</button>

        <div id="resultado"></div>
      </section>

      <section id="page-usuarios" class="page">
        <h2>Usuários</h2>

        <input
          type="text"
          id="buscaUsuario"
          placeholder="Buscar usuário por nome..."
        />
        <button id="btnBuscarUsuario">Buscar usuário</button>

        <div id="resultadoUsuarios"></div>
      </section>

      <section id="page-emprestimos" class="page">
        <h2>Criar empréstimo</h2>

        <div class="form-emprestimo">
          <label for="selectUsuario">Usuário</label>
          <select id="selectUsuario">
            <option value="">Selecione um usuário</option>
          </select>

          <label for="selectLivro">Livro</label>
          <select id="selectLivro">
            <option value="">Selecione um livro</option>
          </select>

          <label for="inputDias">Quantidade de dias</label>
          <input type="number" id="inputDias" min="1" value="7" />

          <button id="btnCriarEmprestimo">Criar empréstimo</button>
        </div>

        <div id="statusEmprestimo"></div>

        <hr />

        <h2>Empréstimos</h2>
        <button id="btnCarregarEmprestimos">Carregar empréstimos</button>
        <div id="resultadoEmprestimos"></div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
